name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js 24 with cache
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: npm install
        run: npm ci

      # Build first so the api workspace can type-check against the crypto
      # workspace's generated declarations.
      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  test:
    name: Build and Test

    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js ${{ matrix.node-version }} with cache
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - if: ${{ matrix.npm-version }}
        run: npm install -g npm@${{ matrix.npm-version }}

      - name: npm install, build and test
        timeout-minutes: 12
        run: |
          npm ci
          npm run build
          npm run test:ci
        env:
          CI: true

      - name: Coverage summary
        if: always() && matrix.node-version == '24'
        run: |
          SUMMARY=packages/tplink-smarthome-api/coverage/coverage-summary.json
          if [ -f "$SUMMARY" ]; then
            node -e '
              const t = require("./packages/tplink-smarthome-api/coverage/coverage-summary.json").total;
              const cap = (s) => s[0].toUpperCase() + s.slice(1);
              const row = (k) => `| ${cap(k)} | ${t[k].pct}% | ${t[k].covered}/${t[k].total} |`;
              const md = ["## Coverage (tplink-smarthome-api)", "", "| Metric | % | Covered / Total |", "| --- | --- | --- |", row("statements"), row("branches"), row("functions"), row("lines"), ""].join("\n");
              require("fs").appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + "\n");
            '
          else
            echo "No coverage summary found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage (lcov)
        if: always() && matrix.node-version == '24'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-lcov
          path: packages/*/coverage/lcov.info
          if-no-files-found: warn
