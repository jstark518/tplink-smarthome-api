name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24 with cache
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: npm install
        run: |
          npm ci

      - name: Lint
        run: |
          npm run lint

  test:
    name: Build and Test

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }} with cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - if: ${{ matrix.npm-version }}
        run: npm install -g npm@${{ matrix.npm-version }}

      - name: npm install, build and test
        run: |
          npm ci
          npm run build
          npm run test:ci
        env:
          CI: true

      - name: Coverage summary
        if: always() && matrix.node-version == '24.x'
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e '
              const t = require("./coverage/coverage-summary.json").total;
              const cap = (s) => s[0].toUpperCase() + s.slice(1);
              const row = (k) => `| ${cap(k)} | ${t[k].pct}% | ${t[k].covered}/${t[k].total} |`;
              const md = ["## Coverage", "", "| Metric | % | Covered / Total |", "| --- | --- | --- |", row("statements"), row("branches"), row("functions"), row("lines"), ""].join("\n");
              require("fs").appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + "\n");
            '
          else
            echo "No coverage summary found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage (lcov)
        if: always() && matrix.node-version == '24.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
