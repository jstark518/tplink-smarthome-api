name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow deploying to GitHub Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install
        run: npm ci

      # typedoc needs the crypto workspace's declarations to resolve the api's imports.
      - name: Build
        run: npm run build

      - name: Build docs (typedoc)
        run: npm run docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: packages/tplink-smarthome-api/docs

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
