name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # OIDC trusted publishing
    # id-token: write also enables build provenance.
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24 with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Verify version matches tag
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          test "$PKG" = "$TAG" || { echo "package.json ($PKG) != tag ($TAG)"; exit 1; }

      # Trusted publishing (OIDC) requires npm >= 11.5.1.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm stage publish --provenance
