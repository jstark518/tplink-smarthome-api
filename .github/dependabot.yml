version: 2

updates:
  # npm — the root manifest plus every workspace (there's a single root
  # package-lock.json, so Dependabot updates all workspaces from "/").
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Pin the toolchain to its supported major line and let Dependabot keep
    # offering the safe minor/patch updates within it. These majors aren't
    # adoptable yet; revisit (and drop the ignore) as the blockers clear.
    ignore:
      # typescript 7 is the native-compiler preview and removes options we
      # still use (moduleResolution=node10). Stay on 5.x → Dependabot offers
      # the latest 5.x, which also provides the newer lib types @types/node
      # needs. See #26.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # @types/node should track the minimum supported Node, not the newest
      # release; hold the major until the TypeScript bump lands. See #26.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # eslint 10 is blocked by eslint-plugin-import (no ^10 peer yet). Hold the
      # eslint toolchain on 9.x until the plugin catches up. See #25.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
    groups:
      # ESLint toolchain is peer-locked: @eslint/js@10 requires eslint@10,
      # typescript-eslint tracks a supported eslint range, and the plugins
      # (import, prettier, tsdoc) follow. Group across ALL update types so a
      # major never lands half-applied and breaks peer resolution.
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
          - "@eslint-community/*"
          - "typescript-eslint"
          - "@typescript-eslint/*"
      # commander and its typed companion @commander-js/extra-typings are
      # versioned in lockstep (extra-typings pins a matching commander major).
      # Group across all update types so they bump together.
      commander:
        patterns:
          - "commander"
          - "@commander-js/*"
      # Everything else dev: fold routine minor/patch churn into one PR. Dev
      # majors not matched by a group above still open individually for review.
      # Production deps outside the commander group (loglevel, promise-queue)
      # stay ungrouped — each warrants its own changeset/release.
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used across the workflows — one grouped PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
